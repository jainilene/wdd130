<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco - Jainilene Nascimento</title>
    <meta name="description" content="Página para conhecer a empresa e entrar em contato">

    <link rel="stylesheet" href="estilos/rafting.css">
</head>
<body>
    <header>
        <img src="imagens/logo.png" alt="Logo Rafting">
        <nav class="top_nav">
            <a href="index.html">Página Inicial</a>
            <a href="sobre.html">Sobre Nós</a>
            <a href="passeios.html">Passeios</a>
            <a href="contato.html">Fale Conosco</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <!-- <img src="imagens/hero-image-rafting-pequeno.jpg" alt="Rafting"> -->
        </div>

        <h1>Empresa X</h1>

        <div class="contatos">
            <h2>Companhia de Rafting em Corredeiras</h2>
            <p>123 Rua Principal do Rio</p>
            <p>Foz do Igraçu, Paraná</p>
            <p>+55 45 99999-9999</p>
            <p>info@correiras.com</p>
            <div class="mapa">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d18642.931950321483!2d-44.3193747176118!3d-2.5014042580800555!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x7f68c03cbe2714f%3A0x7560038a141f3cef!2sCoreto%20do%20Espig%C3%A3o%20da%20Ponta%20d&#39;Areia!5e1!3m2!1spt-BR!2sbr!4v1781385824394!5m2!1spt-BR!2sbr" width="250" height="250" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
        <section class="main_fale_conosco">
            <img src="imagens/hero-image-rafting-pequeno.jpg" alt="ImagemHistoria">
            <form action="" class="formulario">
                <div class="entradas">
                    <label for="nome">Nome</label>
                    <input class="campo" type="text" name="nome" id="nome">
                </div>

                <div class="entradas">
                    <label for="email">Email</label>
                    <input class="campo" type="email" name="email" id="email">
                </div>
                
                <div class="proposito_mensagem">
                    <label class="label_proposito" for="proposito">Propósito da Mensagem</label>
                    <div class="opcoes_proposito">
                        <label class=""><input type="radio" id="duvida"name="proposito">Dúvida Geral</label>
                        <label><input type="radio" id="pergunra" name="proposito">Pergunta sobre Reserva</label>
                        <label><input type="radio" id="sugestão" name="proposito">Sugestão</label>
                    </div>
                </div>
                <div class="div_mensagem">
                    <label name="mensagem" for="mensagem">Mensagem</label>
                </div>
                <textarea name="mensagem" id="mensagem"></textarea>
                <label for="inscricao"><input type="checkbox" id="inscrição" name="inscricao">Por favor, me inscreva na newsletter mensal</label>
                <button type="submit" name="">Enviar</button>

            </form>
        </section>

        <section class="funcionarios">
            <h2>Estamos aqui para Servi-lo</h2>
            <figure class="imgF">
                <img src="imagens/perfil-alessandra.jpg" alt="">
                <figcaption>Alessandra - Gerente</figcaption>
            </figure>
            <figure class="imgF">
                <img src="imagens/perfil-robson-pequena.jpg" alt="">
                <figcaption>Robson - Líder de Passeio</figcaption>
            </figure>
            <figure class="imgF">
                <img src="imagens/perfil-amanda-pequena.jpg" alt="">
                <figcaption>Amanda - Líder de Passeio</figcaption>
            </figure>
        </section>


    </main>

    <footer>
        <p> &copy; 2026 - Empresa X - Jainilene Nascimento</p>
        <nav class="redes-sociais socialmedia">
            <a><img src="imagens/logo-facebook.jpg" alt="Ícone do facebook"></a>
            <a><img src="imagens/logo-linkedin.png" alt="Ícone do Linkedin"></a>
            <a><img src="imagens/logo-instagram.jpg" alt="Ícone do instagram"></a>
        </nav>
    </footer>
</body>
</html>
