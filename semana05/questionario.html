<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="estilos/questionario.css">
</head>
<body>
    <header>
        <h1>Questionário de HTML e CSS</h1>

    <main>
        <form action="">
            <label for="q1">1. O que significa a sigla CSS?</label>
            <input type="text" name="q1" id="q1">

            <label for="q2">2. Como os atributos 'id' e 'class' são selecionados no CSS? </label>

            <label for="q3">3. Qual das opções abaixo é um comentário CSS válido?</label>

                <option value="" selected disabled >Escolha uma...</option>
                <option value="option01">// margin: 0 auto;</option>
                <option value="option02"># margin: 0 auto;</option>
                <option value="option03">/*  margin: 0 auto; */</option>
                <option value="option04">--  margin: 0 auto;</option>
            </select>

            <label for="q4">4. Qual é a margem inferior dada por esta declaração?</label>
            <textarea class="imgq4" disabled name="imgq4" id="imgq4"> margin: 10px 5px 15px;</textarea>
            <input type="number" name="q4" id="q4">

            <button type="submit">Enviar Questionários</button>
